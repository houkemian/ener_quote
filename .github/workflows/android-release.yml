name: Android Release Build

# 触发条件：当你推送 v1.0.0 这样的 tag 时，自动开始打包
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release Android AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      # ==========================================
      # ⚠️【周末带病演习模式：签名模块已全部封印】⚠️
      # 等下周拿到密码后，再把这里的注释解开
      # ==========================================
      
      # - name: 🔐 Decode Keystore
      #   env:
      #     ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      #   run: |
      #     echo $ENCODED_KEYSTORE | base64 -d > android/app/upload-keystore.jks

      # - name: 📝 Create key.properties
      #   run: |
      #     cat << EOF > android/key.properties
      #     storePassword=${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword=${{ secrets.KEY_PASSWORD }}
      #     keyAlias=${{ secrets.KEY_ALIAS }}
      #     storeFile=upload-keystore.jks
      #     EOF

      # ==========================================
      # 🎯 演习目标：打一个无签名的测试包
      # ==========================================
      
      - name: 🏗️ Build Debug APK (Sick Drill)
        run: flutter build apk --debug

      - name: ⬆️ Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 3
name: Android Release Build

# 触发条件：当你推送 v1.0.0 这样的 tag 时，自动开始打包
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release Android AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # 推荐使用 JDK 17 适配最新的 Gradle

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # 开启缓存，大幅提升后续打包速度

      - name: 📦 Install dependencies
        run: flutter pub get

      # 【核心机密 1】：还原你的 Android 签名密钥文件
      # - name: 🔐 Decode Keystore
      #   env:
      #     ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      #   run: |
      #     echo $ENCODED_KEYSTORE | base64 -d > android/app/upload-keystore.jks

      # 【核心机密 2】：动态生成 key.properties 供 Gradle 读取
      # - name: 📝 Create key.properties
      #   run: |
      #     cat << EOF > android/key.properties
      #     storePassword=${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword=${{ secrets.KEY_PASSWORD }}
      #     keyAlias=${{ secrets.KEY_ALIAS }}
      #     storeFile=upload-keystore.jks
      #     EOF

      # 打包 AAB 并注入 RevenueCat 公钥
      - name: 🏗️ Build AppBundle
        env:
          RC_PUBLIC_KEY: ${{ secrets.REVENUECAT_PUBLIC_KEY_ANDROID }}
        run: |
          flutter build appbundle --release \
            --dart-define=REVENUECAT_PUBLIC_KEY_ANDROID=$RC_PUBLIC_KEY

      # 将打好的包上传到 GitHub Actions 的控制台供你下载
      - name: ⬆️ Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ener-quote-frontend
  IMAGE_BACKEND: ener-quote-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/${{ env.IMAGE_FRONTEND }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -eu
            cd ${{ secrets.DEPLOY_PATH }}
            if [ ! -f .env ]; then
              echo "ERROR: ${PWD}/.env not found"
              exit 1
            fi

            required_vars="
            RESTART_POLICY
            POSTGRES_IMAGE
            POSTGRES_CONTAINER_NAME
            POSTGRES_DB
            POSTGRES_USER
            POSTGRES_PASSWORD
            POSTGRES_PORT
            REDIS_IMAGE
            REDIS_CONTAINER_NAME
            REDIS_PORT
            REDIS_DB
            REDIS_APPENDONLY
            BACKEND_IMAGE
            BACKEND_CONTAINER_NAME
            BACKEND_PORT
            FRONTEND_IMAGE
            FRONTEND_CONTAINER_NAME
            FRONTEND_HOST_PORT
            FRONTEND_CONTAINER_PORT
            DB_HOST
            DB_PORT
            DB_NAME
            DB_USER
            DB_PASSWORD
            REDIS_HOST
            "

            missing=0
            for var in $required_vars; do
              if ! rg -n "^${var}=.+" .env >/dev/null 2>&1; then
                echo "ERROR: missing required env var in .env -> ${var}"
                missing=1
              fi
            done

            if [ "$missing" -ne 0 ]; then
              echo "Deployment aborted due to missing .env variables."
              exit 1
            fi

            export GITHUB_REPOSITORY_OWNER=${{ needs.build-and-push.outputs.owner_lc }}
            docker-compose pull
            docker-compose up -d
